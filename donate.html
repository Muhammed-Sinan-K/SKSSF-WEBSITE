<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      (function() {
        const key = new URLSearchParams(window.location.search).get('key');
        if (key === '4182') {
          sessionStorage.setItem('skssf_logged_in', 'true');
          localStorage.setItem('skssf_logged_in', 'true');
        }
        if (sessionStorage.getItem('skssf_logged_in') !== 'true' && localStorage.getItem('skssf_logged_in') !== 'true') {
          const basePath = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
          window.location.replace(basePath + 'login.html');
        } else {
          document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('a').forEach(function(a) {
              try {
                const href = a.getAttribute('href');
                if (href && !href.startsWith('http') && !href.startsWith('mailto') && !href.startsWith('tel') && !href.includes('login.html') && !href.startsWith('#')) {
                  const url = new URL(href, window.location.href);
                  url.searchParams.set('key', '4182');
                  a.setAttribute('href', url.pathname + url.search + url.hash);
                }
              } catch (e) {}
            });
          });
        }
      })();
    </script>
    <meta charset="UTF-8" />

  </head>
