    <main>
      <div class="page-header pattern-bg">
        <div class="container animate-on-scroll">
          <h1>Tasbih Counter</h1>
          <p>Keep track of your daily Dhikr, praises, and prayers in real-time.</p>
        </div>
      </div>

      <section class="py-section">
        <div class="container">
          <div class="counter-layout" style="max-width: 900px; margin: 0 auto;">
            <div class="counter-settings">
              <h3>Counter Settings</h3>
              <div class="form-group mt-4">
                <label for="dhikr-preset">Select Dhikr</label>
                <select id="dhikr-preset" class="form-control">
                  <option value="SubhanAllah">SubhanAllah (سبحان الله)</option>
                  <option value="Alhamdulillah">Alhamdulillah (الحمد لله)</option>
                  <option value="AllahuAkbar">Allahu Akbar (الله أكبر)</option>
                  <option value="Astaghfirullah">Astaghfirullah (أستغفر الله)</option>
                  <option value="LaIlahaIllallah">La ilaha illallah (لا إله إلا الله)</option>
                  <option value="Custom">Custom Dhikr</option>
                </select>
              </div>
              <div class="form-group" id="custom-dhikr-group" style="display: none;">
                <label for="custom-dhikr-input">Custom Dhikr Text</label>
                <input type="text" id="custom-dhikr-input" placeholder="Type your dhikr here..." class="form-control" />
              </div>
              <div class="form-group">
                <label for="counter-target">Target Count</label>
                <input type="number" id="counter-target" value="33" min="1" class="form-control" />
              </div>
              <div class="form-group checkbox-group">
                <input type="checkbox" id="sound-enabled" checked />
                <label for="sound-enabled">Enable Click Sound</label>
              </div>
              <button id="reset-counter-btn" class="btn btn-outline" style="width: 100%; margin-top: 1rem;">Reset Counter</button>
            </div>

            <div class="counter-display-panel">
              <div class="dhikr-display-text" id="active-dhikr-text">SubhanAllah</div>
              <div class="counter-circle-outer" id="counter-click-area">
                <div class="counter-circle-inner">
                  <span id="counter-value">0</span>
                  <span class="counter-label">Tap to Count</span>
                </div>
              </div>
              <div class="counter-progress-bar">
                <div class="counter-progress-fill" id="counter-progress"></div>
              </div>
              <div class="counter-target-display">Target: <span id="target-value">33</span></div>
            </div>
          </div>
        </div>
      </section>
    </main>
